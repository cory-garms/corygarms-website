name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Run Health Audit
        run: npm run audit --audit-level=high

    # We could add Lighthouse CI here later, but it often needs a built server to test against
    # Lighthouse CLI or a dedicated action can be triggered after deployment.
