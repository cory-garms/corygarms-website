version: "3.8"

services:
  dev:
    image: node:22-alpine
    container_name: corygarms-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4321:4321"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NODE_ENV=development

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corygarms-prod
    ports:
      - "8080:80"
